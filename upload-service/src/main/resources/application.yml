spring:
  application:
    name: upload-service
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  datasource:
    url: jdbc:postgresql://localhost:5433/upload_db
    username: streamforge
    password: streamforge_dev
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "com.streamforge.dto.event,com.streamforge.dto.event.*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  raw-bucket: streamforge-raw
  processed-bucket: streamforge-processed

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    enabled: true

server:
  port: 8081
