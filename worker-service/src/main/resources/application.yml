spring:
  application:
    name: worker-service
  datasource:
    url: jdbc:postgresql://localhost:5433/streamforge
    username: streamforge
    password: streamforge_dev
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: media-processing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.streamforge.dto.event,com.streamforge.dto.event.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "com.streamforge.dto.event,com.streamforge.dto.event.*"

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  raw-bucket: streamforge-raw
  processed-bucket: streamforge-processed

ffmpeg:
  path: ffmpeg
  ffprobe-path: ffprobe
  timeout-seconds: 600

processing:
  temp-dir: /tmp/streamforge/processing
  resolutions:
    - label: "1080p"
      width: 1920
      height: 1080
      bitrate: "5000k"
    - label: "720p"
      width: 1280
      height: 720
      bitrate: "2500k"
    - label: "480p"
      width: 854
      height: 480
      bitrate: "1000k"
  thumbnail:
    width: 640
    height: 360
    timestamp: "00:00:05"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: 8081
