version: '3.8'

services:
  # ── Upload Service Database ─────────────────────────────────────
  upload-postgres:
    image: postgres:16-alpine
    container_name: streamforge-upload-postgres
    environment:
      POSTGRES_DB: upload_db
      POSTGRES_USER: streamforge
      POSTGRES_PASSWORD: streamforge_dev
    ports:
      - "5433:5432"
    volumes:
      - upload_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamforge -d upload_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Catalog Service Database ────────────────────────────────────
  catalog-postgres:
    image: postgres:16-alpine
    container_name: streamforge-catalog-postgres
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: streamforge
      POSTGRES_PASSWORD: streamforge_dev
    ports:
      - "5434:5432"
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamforge -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Worker Service Database ─────────────────────────────────────
  worker-postgres:
    image: postgres:16-alpine
    container_name: streamforge-worker-postgres
    environment:
      POSTGRES_DB: worker_db
      POSTGRES_USER: streamforge
      POSTGRES_PASSWORD: streamforge_dev
    ports:
      - "5435:5432"
    volumes:
      - worker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamforge -d worker_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Object Storage (MinIO — S3 Compatible) ──────────────────────
  minio:
    image: minio/minio:latest
    container_name: streamforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: streamforge-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb local/streamforge-raw --ignore-existing;
      mc mb local/streamforge-processed --ignore-existing;
      echo 'Buckets created successfully';
      "

  # ── Message Broker (Kafka — KRaft mode) ─────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streamforge-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LATEST_METHOD: 'kraft'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: streamforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  upload_postgres_data:
  catalog_postgres_data:
  worker_postgres_data:
  minio_data:
  redis_data:
  processing_temp:
