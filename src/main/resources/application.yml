spring:
  application:
    name: streamforge
  web:
    resources:
      add-mappings: false  # Disable default static resource handler (was intercepting /api/uploads/.../file)
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  datasource:
    url: jdbc:postgresql://localhost:5433/streamforge
    username: streamforge
    password: streamforge_dev
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  raw-bucket: streamforge-raw
  processed-bucket: streamforge-processed

ffmpeg:
  path: ffmpeg
  ffprobe-path: ffprobe
  timeout-seconds: 600

processing:
  temp-dir: /tmp/streamforge/processing
  resolutions:
    - label: "1080p"
      width: 1920
      height: 1080
      bitrate: "5000k"
    - label: "720p"
      width: 1280
      height: 720
      bitrate: "2500k"
    - label: "480p"
      width: 854
      height: 480
      bitrate: "1000k"
  thumbnail:
    width: 640
    height: 360
    timestamp: "00:00:05"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    enabled: true

server:
  port: 8080
